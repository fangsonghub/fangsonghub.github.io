name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Remove duplicate page artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const artifactName = 'github-pages';
            const allArtifacts = [];
            const perPage = 100;
            for (let page = 1; ; page++) {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
                per_page: perPage,
                page,
              });
              allArtifacts.push(...data.artifacts);
              if (data.artifacts.length < perPage) {
                break;
              }
            }

            const artifacts = allArtifacts
              .filter((artifact) => artifact.name === artifactName)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (artifacts.length <= 1) {
              core.info(`Found ${artifacts.length} \"${artifactName}\" artifact. No cleanup needed.`);
              return;
            }

            core.warning(`Found ${artifacts.length} \"${artifactName}\" artifacts. Keeping newest and deleting duplicates.`);
            for (const artifact of artifacts.slice(1)) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              core.info(`Deleted duplicate artifact ${artifact.id}`);
            }
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
