<!doctype html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body id="page">
{% include navigation.html %}
{% if page.logo == true %}
{% include logo.html %}
{% endif %}
{% include subnav.html %}
<div id="main" role="main">
  <article class="entry">
    <div class="entry-wrapper">
      <div class="entry-content">
        {{ content }}
      </div>
    </div>
  </article>
</div>
<div class="footer-wrapper">
    <footer role="contentinfo" class="entry-wrapper">
	{% include footer.html %}
    </footer>
</div>
{% include scripts.html %}
</body>
</html>
