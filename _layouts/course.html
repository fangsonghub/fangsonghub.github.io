<!doctype html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body id="page">
{% include navigation.html %}
{% include course_nav.html %}
<div id="main" role="main">
  <article class="entry">
    <div class="entry-wrapper course-wrapper">
      <header class="course-header-block">
        <div class="course-header-meta">
          <span class="course-header-term">{{ page.term }}</span>
        </div>
        <h1 class="course-header-title">{{ page.title }}</h1>
        {% if page.subtitle %}<p class="course-header-subtitle">{{ page.subtitle }}</p>{% endif %}
      </header>
      <div class="entry-content">
        {{ content }}
      </div>
    </div>
  </article>
</div>
<div class="footer-wrapper">
    <footer role="contentinfo" class="entry-wrapper">
	{% include footer.html %}
    </footer>
</div>
{% include scripts.html %}
</body>
</html>
