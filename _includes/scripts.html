<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- Theme toggle -->
<script>
(function() {
  var btn = document.getElementById('theme-toggle');
  var root = document.documentElement;

  function updateIcon() {
    var isDark = root.getAttribute('data-theme') === 'dark';
    btn.querySelector('.theme-icon').textContent = isDark ? '☽' : '☀︎';
  }

  updateIcon();

  btn.addEventListener('click', function() {
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateIcon();
  });
})();
</script>

<!-- Hamburger nav -->
<script>
 (function() {
     var toggle = document.getElementById('nav-toggle');
     var menu = document.getElementById('nav-menu');

     if (toggle && menu) {
	 toggle.addEventListener('click', function() {
	     var isOpen = menu.classList.toggle('open');
	     toggle.classList.toggle('open', isOpen);
	     toggle.setAttribute('aria-expanded', isOpen);
	 });

	 menu.querySelectorAll('a').forEach(function(link) {
	     link.addEventListener('click', function() {
		 menu.classList.remove('open');
		 toggle.classList.remove('open');
		 toggle.setAttribute('aria-expanded', false);
	     });
	 });
     }
 })();
</script>

<!-- Subnav active highlighting -->
<script>
 (function() {
     var navLinks = document.querySelectorAll('.course-nav a');
     if (!navLinks.length) return;

     var currentPath = window.location.pathname;
     var currentHash = window.location.hash;

     navLinks.forEach(function(link) {
	 var href = link.getAttribute('href');
	 var path = href.replace(/^https?:\/\/[^\/]+/, '');

	 // Case 1: anchor links (research page)
	 if (path.indexOf('#') !== -1) {
	     var linkHash = path.substring(path.indexOf('#'));
	     if (currentHash === linkHash) {
		 link.classList.add('active');
	     }
	 }
	 // Case 2: regular page links (course pages)
	 else {
	     if (path === currentPath) {
		 link.classList.add('active');
	     }
	 }
     });

     // Update active on hash change (research page)
     window.addEventListener('hashchange', function() {
	 navLinks.forEach(function(link) {
	     link.classList.remove('active');
	     var href = link.getAttribute('href');
	     var path = href.replace(/^https?:\/\/[^\/]+/, '');
	     if (path.indexOf('#') !== -1) {
		 var linkHash = path.substring(path.indexOf('#'));
		 if (window.location.hash === linkHash) {
		     link.classList.add('active');
		 }
	     }
	 });
     });
 })();
</script>
